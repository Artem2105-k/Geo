services:
  rpcserver:
    build:
      context: .
      dockerfile: Dockerfile.rpc
    ports:
      - "8081:8081"
    environment:
      - DADATA_API_KEY=${DADATA_API_KEY}
      - DADATA_SECRET_KEY=${DADATA_SECRET_KEY}
    restart: unless-stopped
    stdin_open: true
    tty: true

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - rpcserver
    environment:
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./docs:/app/docs
    restart: unless-stopped